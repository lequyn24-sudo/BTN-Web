<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Test</title>
  <style>
    body {
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      gap: 20px;
      font-family: sans-serif;
    }
    
    .btn-secondary {
      background: linear-gradient(180deg, #2a2a2a 0%, #000000 100%);
      color: #eaeaea;
      border-radius: 9999px;
      padding: 10px 24px;
      font-weight: 500;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.4),
        inset 0 10px 15px rgba(255, 255, 255, 0.05),
        inset 0 -4px 6px rgba(0, 0, 0, 0.8),
        0 0 0 2px #0a0a0a,
        0 0 0 4px rgba(255, 255, 255, 0.15),
        0 4px 10px rgba(0, 0, 0, 0.5);
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(180deg, #d34a00 0%, #5a1500 100%);
      color: #fff;
      border-radius: 9999px;
      padding: 10px 24px;
      font-weight: 600;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      box-shadow: 
        inset 0 1.5px 1px rgba(255, 255, 255, 0.6),
        inset 0 10px 15px rgba(255, 100, 0, 0.3),
        inset 0 -6px 8px rgba(0, 0, 0, 0.7),
        0 0 0 2px #1a0500,
        0 0 0 4px #9c3300,
        0 0 15px rgba(255, 80, 0, 0.4),
        0 4px 10px rgba(0, 0, 0, 0.5);
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button class="btn-secondary">Projects</button>
  <button class="btn-primary">Start Now</button>

</body>
</html>
